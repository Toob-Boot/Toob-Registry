name: Registry Auto-Release

on:
  push:
    branches:
      - main
    paths:
      - 'chips/**'
      - 'toolchains/**'
      - 'vendor/**'
      - 'arch/**'

permissions:
  contents: write # Needed to commit registry.json and create tags

jobs:
  release:
    name: Generate Index & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          token: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache: false

      - name: Run SemVer Calculator
        run: |
          echo ">>> Calculating automated Semantic Version bumps..."
          BEFORE_SHA="${{ github.event.before }}"
          CURRENT_SHA="${{ github.sha }}"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BEFORE_SHA="HEAD^"
          fi
          go run scripts/semver_calc.go $BEFORE_SHA $CURRENT_SHA

      - name: Run Aggregator
        run: |
          echo ">>> Generating global registry.json index..."
          go run scripts/build_registry.go

      - name: Commit and Tag Release
        run: |
          # Configure Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if registry.json was modified
          if git diff --exit-code registry.json; then
            echo "No changes in registry.json detected."
            exit 0
          fi
          
          # Extract the new version from registry.json
          NEW_VERSION=$(jq -r '.registry_version' registry.json)
          
          echo ">>> Committing registry.json with version $NEW_VERSION"
          git add registry.json vendor/** chips/** arch/** toolchains/**
          git commit -m "chore: auto-generate registry index $NEW_VERSION [skip ci]"
          
          echo ">>> Pushing commit to main..."
          git push origin main
          
          echo ">>> Creating Git Tag $NEW_VERSION..."
          git tag "$NEW_VERSION" || echo "Tag already exists"
          git push origin "$NEW_VERSION" || echo "Push tag skipped"
