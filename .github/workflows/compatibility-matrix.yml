name: Compatibility Matrix (HCP)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *" # Run nightly at 2 AM
  pull_request:
    paths:
      - "chips/**"
      - "toolchains/**"
      - "vendor/**"
      - "arch/**"
  push:
    branches:
      - main
    paths:
      - "chips/**"
      - "toolchains/**"
      - "vendor/**"
      - "arch/**"

permissions:
  contents: write # Needed to commit compatibility_matrix.json

jobs:
  generate:
    name: Generate Matrix Queue
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache: false

      - name: Run Aggregator Validation
        run: go run scripts/build_registry.go -validate

      - name: Generate Queue
        id: set-matrix
        run: |
          QUEUE=$(go run scripts/matrix_generator.go)
          echo "Test Queue: $QUEUE"
          echo "matrix=$QUEUE" >> $GITHUB_OUTPUT

  test:
    name: Test Chip ${{ matrix.target.chip }} @ ${{ matrix.target.cli }}
    needs: generate
    if: ${{ needs.generate.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.generate.outputs.matrix) }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache: false

      - name: Setup System Dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -yq build-essential libusb-1.0-0 ninja-build cmake python3-pip

      - name: Cache Toolchains
        uses: actions/cache@v5
        with:
          path: ~/.toob/toolchains
          key: ${{ runner.os }}-toolchains-${{ hashFiles('toolchains/**/toolchain_manifest.json') }}

      - name: Build Toob CLI
        run: |
          git clone https://github.com/Toob-Boot/Toob-Loader.git /tmp/Toob-Loader
          cd /tmp/Toob-Loader

          CLI_VER="${{ matrix.target.cli }}"
          if [ "$CLI_VER" != "main" ] && [ "$CLI_VER" != "" ]; then
            echo "Checking out Toob-Loader cli version: $CLI_VER"
            git checkout $CLI_VER || echo "Warning: Tag $CLI_VER not found, using main"
          fi

          # Install Python SUIT dependencies
          if [ -f requirements.txt ]; then
            pip3 install -r requirements.txt --break-system-packages
          else
            pip3 install cryptography "cbor2<6.0.0" ecdsa zcbor --break-system-packages
          fi

          cd cli/toob-cli
          go build -o toob
          sudo mv toob /usr/local/bin/

      - name: Native C-Compilation Build
        run: |
          echo ">>> Spawning Dummy Project for ${{ matrix.target.chip }} (CLI: ${{ matrix.target.cli }})..."
          # Inject PR Registry into local cache so init and build use the modified files
          mkdir -p ~/.toob/registry
          cp -a $GITHUB_WORKSPACE/. ~/.toob/registry/

          toob init dummy-app --chip ${{ matrix.target.chip }}
          cd dummy-app

          export TOOB_COMPILER_DIR=/tmp/Toob-Loader
          toob build --native

      - name: Generate Result Artifact
        if: always()
        run: |
          # Re-calculate state hash for this specific chip
          go run scripts/matrix_generator.go > /dev/null # Ensure deps
          HASH=$(env CHIP=${{ matrix.target.chip }} go run scripts/matrix_generator.go || echo "dummyhash")

          # Determine Status
          STATUS="FAILED"
          if [ "${{ job.status }}" == "success" ]; then
            STATUS="VERIFIED"
          fi

          # Save result
          echo "{\"chip\":\"${{ matrix.target.chip }}\", \"cli_version\":\"${{ matrix.target.cli }}\", \"status\":\"$STATUS\", \"state_hash\":\"$HASH\"}" > result_${{ matrix.target.chip }}_${{ matrix.target.cli }}.json

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: result-${{ matrix.target.chip }}-${{ matrix.target.cli }}
          path: result_${{ matrix.target.chip }}_${{ matrix.target.cli }}.json

  update-ledger:
    name: Update Matrix Ledger
    needs: [generate, test]
    if: always() && needs.generate.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Download All Results
        uses: actions/download-artifact@v8
        with:
          pattern: result-*
          merge-multiple: true

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache: false

      - name: Update Ledger JSON
        run: go run scripts/update_ledger.go

      - name: Commit and Push Ledger
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add compatibility_matrix.json
          # Only commit if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "chore(ci): update compatibility matrix ledger [skip ci]"
            # Rebase to avoid conflicts if main was updated during tests
            git pull --rebase origin main
            git push
          fi
