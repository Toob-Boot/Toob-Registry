name: Compatibility Matrix (HCP)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' # Run nightly at 2 AM
  pull_request:
    paths:
      - 'chips/**'
      - 'toolchains/**'
  push:
    branches:
      - main
    paths:
      - 'chips/**'
      - 'toolchains/**'

permissions:
  contents: write # Needed to commit compatibility_matrix.json

jobs:
  generate:
    name: Generate Matrix Queue
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: false

      - name: Run Aggregator Validation
        run: go run scripts/build_registry.go -validate

      - name: Generate Queue
        id: set-matrix
        run: |
          QUEUE=$(go run scripts/matrix_generator.go)
          echo "Test Queue: $QUEUE"
          echo "matrix=$QUEUE" >> $GITHUB_OUTPUT

  test:
    name: Test Chip ${{ matrix.chip }}
    needs: generate
    if: ${{ needs.generate.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        chip: ${{ fromJson(needs.generate.outputs.matrix) }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: false

      # In a real environment, we would clone Toob-Loader, build the CLI, and run `toob build --native`
      - name: Simulate C-Compilation Build
        run: |
          echo ">>> Spawning Dummy Project for ${{ matrix.chip }}..."
          echo ">>> Running Native Build..."
          echo "Build successful!"
          
      - name: Generate State Hash Artifact
        run: |
          # Re-calculate state hash for this specific chip
          go run scripts/matrix_generator.go > /dev/null # Ensure deps
          HASH=$(env CHIP=${{ matrix.chip }} go run scripts/matrix_generator.go || echo "dummyhash")
          # Save result
          echo "{\"chip\":\"${{ matrix.chip }}\", \"status\":\"VERIFIED\", \"state_hash\":\"$HASH\"}" > result_${{ matrix.chip }}.json

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.chip }}
          path: result_${{ matrix.chip }}.json

  update-ledger:
    name: Update Matrix Ledger
    needs: [generate, test]
    if: always() && needs.generate.outputs.matrix != '[]' && needs.test.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          
      # In the future: Download all result artifacts and use a script to append them to compatibility_matrix.json
      # Then commit to main if github.ref == 'refs/heads/main'
      - name: Placeholder for Ledger Updater
        run: echo "Updating compatibility_matrix.json..."
