name: Registry PR Validator

on:
  pull_request:
    paths:
      - "chips/**"
      - "toolchains/**"
      - "vendor/**"
      - "arch/**"
      - "registry.json"

permissions:
  contents: read

jobs:
  validate:
    name: Validate Registry Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache: false

      - name: Run Aggregator Validation
        run: |
          echo ">>> Validating JSON Manifests and Structural Integrity..."
          go run scripts/build_registry.go -validate

      - name: Run SemVer Downgrade Check
        env:
          GITHUB_EVENT_NAME: pull_request
        run: |
          echo ">>> Checking for illegal SemVer downgrades..."
          go run scripts/semver_calc.go ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}
