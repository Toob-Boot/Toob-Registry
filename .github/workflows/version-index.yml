name: Generate Version Index

on:
  push:
    branches:
      - main
    paths:
      - "chips/**"
      - "toolchains/**"
      - "drivers/**"
      - "arch/**"
      - "integrations/**"
  workflow_dispatch:
  workflow_run:
    workflows: ["Registry Auto-Release"]
    types:
      - completed

permissions:
  contents: write # Needed to commit version_topology.json

jobs:
  generate:
    name: Generate Index Map
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache: false

      - name: Run Index Generator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ">>> Generating version index..."
          go run -mod=mod scripts/generate_index.go

      - name: Commit and Push
        run: |
          # Configure Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Check if version_index.json was modified
          if git diff --exit-code version_index.json; then
            echo "No changes in version_index.json detected."
            exit 0
          fi

          echo ">>> Committing version_index.json"
          git add version_index.json
          git commit -m "chore: auto-update version_index.json [skip ci]"

          echo ">>> Pushing commit to main..."
          git pull --rebase origin main
          git push origin main
