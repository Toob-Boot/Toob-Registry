services:
  matrix-farm:
    build:
      context: .
      dockerfile: Dockerfile.farm
    container_name: toob-matrix-farm
    restart: unless-stopped
    volumes:
      # Mount the registry repository into the container
      - ./:/farm
      # Allow toob build to spawn the compiler container via host Docker daemon
      - /var/run/docker.sock:/var/run/docker.sock
      # Cache for downloaded CLI binaries
      - matrix_cli_cache:/cache/cli
      # Cache for Go modules
      - matrix_go_cache:/go/pkg/mod
    environment:
      # GITHUB_TOKEN is required for higher API rate limits when pulling tags
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  matrix_cli_cache:
  matrix_go_cache:
